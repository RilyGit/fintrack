<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance-Money</title>
    <link rel="stylesheet" href="Finance.css">
</head>
<body>
    <div class="App">
        <div class="App_Control">
    <div class="Balance_User">
        <p>Ваш баланс:</p>
        <p id="balance"> 0 </p>
    </div>
    <div class="Amout_Number"> 
        <input type="number" id="amount" placeholder="Введите сумму">
    </div>

    <div class="categories_Name">
    <select id="categories" name="category">
    <option value="Продукты">Продукты</option>
    <option value="Кафе">Кафе</option>
    <option value="Дом">Дом</option>
    </select>
    </div>

    <div class="operation_buttons">
    <button id="plus">+</button>
    <button id="minuc">-</button>
  </div>
 
 </div> 

<div class="Dashboard"> 
    
        <div class="History_Column">
            <button id="All_income" class="header_btn income">Всі витратити</button>
            <div id="CreateAll_income"></div>
        </div>

        <div class="History_Column">
            <button id="All_expenses" class="header_btn expenses">Всі надходження</button>
            <div id="CreateAll_expenses"></div>
        </div>
    
    </div>

</div> 
</body>
<script src="Finance.js"></script>
</html>
